<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONCIL-IA · Visor Jerárquico</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            display: flex;
            gap: 20px;
            height: calc(100vh - 40px);
            max-width: 1800px;
            margin: 0 auto;
        }

        /* Panel Izquierdo */
        .panel-izq {
            flex: 0 0 320px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow-y: auto;
        }

        /* Panel Derecho */
        .panel-der {
            flex: 1;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e2e8f0;
        }

        .header h1 {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .badge {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-top: 8px;
        }

        .info-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-icon {
            width: 36px;
            height: 36px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3b82f6;
            font-size: 18px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 15px;
            color: #0f172a;
            font-weight: 600;
        }

        .filtro-grupo {
            margin-bottom: 20px;
        }

        .filtro-titulo {
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        select, input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            margin-bottom: 10px;
            background: white;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #3b82f6;
            border: 2px solid #3b82f6;
        }

        .btn-secondary:hover {
            background: #f0f9ff;
        }

        .search-box {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 15px;
            margin-bottom: 20px;
            background: white;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 8px;
        }

        .stats-info {
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            color: #334155;
            font-weight: 500;
        }

        .table-container {
            flex: 1;
            overflow-x: auto;
            overflow-y: auto;
            border-radius: 20px;
            background: white;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 1300px;
        }

        th {
            background: #1e293b;
            color: white;
            font-weight: 600;
            padding: 14px 10px;
            position: sticky;
            top: 0;
            z-index: 10;
            white-space: nowrap;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
        }

        tr:hover td {
            background: #f8fafc;
        }

        .nivel-1 {
            font-weight: 700;
            color: #0f172a;
            padding-left: 20px !important;
            background: rgba(59, 130, 246, 0.02);
        }
        .nivel-2 {
            font-weight: 600;
            color: #1e293b;
            padding-left: 45px !important;
        }
        .nivel-3 {
            font-weight: 500;
            color: #334155;
            padding-left: 70px !important;
        }
        .nivel-4 {
            font-weight: 500;
            color: #475569;
            padding-left: 95px !important;
        }
        .nivel-5 {
            font-weight: 400;
            color: #64748b;
            padding-left: 120px !important;
        }

        .moneda {
            color: #059669;
            font-weight: 600;
        }
        .mora {
            color: #b91c1c;
            font-weight: 700;
        }

        .hierarchy-icon {
            display: inline-block;
            width: 20px;
            margin-right: 8px;
            color: #94a3b8;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #64748b;
        }

        .loading i {
            font-size: 56px;
            color: #3b82f6;
            margin-bottom: 20px;
        }

        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Panel Izquierdo -->
        <div class="panel-izq">
            <div class="header">
                <h1>
                    <i class="fas fa-bolt"></i>
                    CONCIL-IA
                </h1>
                <span class="badge">v3.1 · API DIRECTA</span>
            </div>

            <div class="info-card">
                <div class="info-item">
                    <div class="info-icon"><i class="fas fa-server"></i></div>
                    <div class="info-content">
                        <div class="info-label">API Status</div>
                        <div class="info-value" id="apiStatus">Conectando...</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon"><i class="fas fa-database"></i></div>
                    <div class="info-content">
                        <div class="info-label">Registros</div>
                        <div class="info-value" id="totalRegistros">-</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon"><i class="fas fa-clock"></i></div>
                    <div class="info-content">
                        <div class="info-label">Respuesta</div>
                        <div class="info-value" id="tiempoRespuesta">-</div>
                    </div>
                </div>
            </div>

            <div class="filtro-grupo">
                <div class="filtro-titulo">
                    <i class="fas fa-building" style="color: #3b82f6;"></i> Empresa
                </div>
                <select id="filtroEmpresa" onchange="aplicarFiltros()">
                    <option value="">Todas las empresas</option>
                </select>
            </div>

            <div class="filtro-grupo">
                <div class="filtro-titulo">
                    <i class="fas fa-city" style="color: #3b82f6;"></i> Proyecto
                </div>
                <select id="filtroProyecto" onchange="aplicarFiltros()">
                    <option value="">Todos los proyectos</option>
                </select>
            </div>

            <div class="filtro-grupo">
                <div class="filtro-titulo">
                    <i class="fas fa-layer-group" style="color: #3b82f6;"></i> Agrupación
                </div>
                <select id="filtroAgrupacion" onchange="aplicarFiltros()">
                    <option value="">Todas las agrupaciones</option>
                </select>
            </div>

            <button class="btn btn-primary" onclick="cargarDatos(true)">
                <i class="fas fa-sync-alt"></i> Recargar Datos
            </button>

            <button class="btn btn-secondary" onclick="window.open('https://script.google.com/macros/s/AKfycbwSiws2mjXlCniHFa7c-GDOFgmMNoGxIsxQ0XKzFNO1XsRM15BqTw2xv9sekNt_BHJmhg/exec?path=datos', '_blank')">
                <i class="fas fa-eye"></i> Ver API
            </button>
        </div>

        <!-- Panel Derecho -->
        <div class="panel-der">
            <div class="stats-bar">
                <div class="stats-info" id="statsInfo">
                    <i class="fas fa-spinner fa-spin"></i> Cargando...
                </div>
                <div class="stats-info">
                    <i class="fas fa-sitemap"></i> Empresa → Proyecto → Agrupación → Apto → Comprador
                </div>
            </div>

            <input type="text" class="search-box" id="buscador" 
                   placeholder="🔍 Buscar en toda la tabla..." onkeyup="buscar()">

            <div class="table-container" id="tablaContainer">
                <div class="loading">
                    <i class="fas fa-cloud-download-alt fa-spin"></i>
                    <p>Cargando datos desde API...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURACIÓN =====
        const API_URL = 'https://script.google.com/macros/s/AKfycbwSiws2mjXlCniHFa7c-GDOFgmMNoGxIsxQ0XKzFNO1XsRM15BqTw2xv9sekNt_BHJmhg/exec';
        
        // Variables globales
        let datosOriginales = [];
        let datosFiltrados = [];
        let filtrosCache = null;
        let timeoutBusqueda;

        // ===== INICIALIZACIÓN =====
        document.addEventListener('DOMContentLoaded', () => {
            cargarFiltros();
            cargarDatos();
        });

        // ===== CARGAR FILTROS =====
        async function cargarFiltros() {
            try {
                const response = await fetch(`${API_URL}?path=filtros&_=${Date.now()}`);
                const data = await response.json();
                
                if (data.success && data.filtros) {
                    filtrosCache = data.filtros;
                    actualizarSelectores(data.filtros);
                }
            } catch (error) {
                console.error('Error filtros:', error);
            }
        }

        function actualizarSelectores(filtros) {
            const selectEmpresa = document.getElementById('filtroEmpresa');
            const selectProyecto = document.getElementById('filtroProyecto');
            const selectAgrupacion = document.getElementById('filtroAgrupacion');

            selectEmpresa.innerHTML = '<option value="">Todas las empresas</option>';
            selectProyecto.innerHTML = '<option value="">Todos los proyectos</option>';
            selectAgrupacion.innerHTML = '<option value="">Todas las agrupaciones</option>';

            if (filtros.empresas?.length) {
                filtros.empresas.forEach(emp => {
                    selectEmpresa.innerHTML += `<option value="${emp.replace(/"/g, '&quot;')}">${emp}</option>`;
                });
            }
            if (filtros.proyectos?.length) {
                filtros.proyectos.forEach(pro => {
                    selectProyecto.innerHTML += `<option value="${pro.replace(/"/g, '&quot;')}">${pro}</option>`;
                });
            }
            if (filtros.agrupaciones?.length) {
                filtros.agrupaciones.forEach(agr => {
                    selectAgrupacion.innerHTML += `<option value="${agr.replace(/"/g, '&quot;')}">${agr}</option>`;
                });
            }
        }

        // ===== CARGAR DATOS =====
        async function cargarDatos(forceRefresh = false) {
            const startTime = performance.now();
            const statsInfo = document.getElementById('statsInfo');
            const apiStatus = document.getElementById('apiStatus');
            const tiempoRespuesta = document.getElementById('tiempoRespuesta');

            try {
                statsInfo.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Consultando API...';
                apiStatus.innerHTML = '<span style="color: #f59e0b;">⏳ Consultando...</span>';

                const url = forceRefresh ? `${API_URL}?path=datos&force=true&_=${Date.now()}` : `${API_URL}?path=datos&_=${Date.now()}`;
                const response = await fetch(url);
                const data = await response.json();

                const elapsed = Math.round(performance.now() - startTime);

                if (!data.success) {
                    throw new Error(data.error || 'Error desconocido');
                }

                datosOriginales = data.datos || [];
                datosFiltrados = datosOriginales;

                apiStatus.innerHTML = '<span style="color: #10b981;">✅ Conectado</span>';
                document.getElementById('totalRegistros').innerHTML = data.total || datosOriginales.length;
                tiempoRespuesta.innerHTML = `${data.tiempo || 0}ms (${elapsed}ms)`;
                statsInfo.innerHTML = `<i class="fas fa-database"></i> ${datosOriginales.length} registros`;

                renderizarTabla();

            } catch (error) {
                console.error('Error:', error);
                apiStatus.innerHTML = '<span style="color: #ef4444;">❌ Error</span>';
                statsInfo.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error de conexión';
                document.getElementById('tablaContainer').innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-circle" style="font-size: 32px; margin-bottom: 15px;"></i>
                        <p>${error.message}</p>
                        <p style="font-size: 12px; margin-top: 15px;">Verificá que la API esté publicada</p>
                    </div>
                `;
            }
        }

        // ===== FILTROS =====
        function aplicarFiltros() {
            const empresa = document.getElementById('filtroEmpresa').value;
            const proyecto = document.getElementById('filtroProyecto').value;
            const agrupacion = document.getElementById('filtroAgrupacion').value;

            datosFiltrados = datosOriginales.filter(d => {
                if (empresa && d.empresa !== empresa) return false;
                if (proyecto && d.proyecto !== proyecto) return false;
                if (agrupacion && d.agrupacion !== agrupacion) return false;
                return true;
            });

            document.getElementById('statsInfo').innerHTML = 
                `<i class="fas fa-filter"></i> ${datosFiltrados.length} registros filtrados`;
            
            renderizarTabla();
        }

        // ===== BÚSQUEDA =====
        function buscar() {
            clearTimeout(timeoutBusqueda);
            timeoutBusqueda = setTimeout(() => {
                const texto = document.getElementById('buscador').value.toLowerCase();
                
                if (!texto) {
                    datosFiltrados = [...datosOriginales];
                } else {
                    datosFiltrados = datosOriginales.filter(d => 
                        Object.values(d).some(val => 
                            String(val).toLowerCase().includes(texto)
                        )
                    );
                }
                
                document.getElementById('statsInfo').innerHTML = 
                    `<i class="fas fa-search"></i> ${datosFiltrados.length} resultados`;
                
                renderizarTabla();
            }, 300);
        }

        // ===== RENDERIZAR TABLA =====
        function renderizarTabla() {
            const container = document.getElementById('tablaContainer');
            
            if (!datosFiltrados.length) {
                container.innerHTML = '<div class="error-message">No hay datos para mostrar</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Empresa</th>
                            <th>Proyecto</th>
                            <th>Agrupación</th>
                            <th>Apartamento</th>
                            <th>Comprador</th>
                            <th>Identificación</th>
                            <th>Fecha</th>
                            <th>Vr.Venta</th>
                            <th>Total Mora</th>
                            <th>Tipo</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            const mostrar = datosFiltrados.slice(0, 1000);
            
            mostrar.forEach(d => {
                html += `
                    <tr>
                        <td class="nivel-1"><i class="fas fa-building hierarchy-icon"></i>${d.empresa || '-'}</td>
                        <td class="nivel-2"><i class="fas fa-chevron-right hierarchy-icon"></i>${d.proyecto || '-'}</td>
                        <td class="nivel-3"><i class="fas fa-chevron-right hierarchy-icon"></i>${d.agrupacion || '-'}</td>
                        <td class="nivel-4"><i class="fas fa-door-open hierarchy-icon"></i>${d.apto || '-'}</td>
                        <td class="nivel-5"><i class="fas fa-user hierarchy-icon"></i>${d.comprador || '-'}</td>
                        <td>${d.identificacion || '-'}</td>
                        <td>${d.fecha || '-'}</td>
                        <td class="moneda">${d.vrVenta || '$0'}</td>
                        <td class="mora">${d.totalMora || '$0'}</td>
                        <td>${d.tipo || '-'}</td>
                    </tr>
                `;
            });

            if (datosFiltrados.length > 1000) {
                html += `<tr><td colspan="10" style="text-align: center; background: #f1f5f9; padding: 15px;">
                    <i class="fas fa-info-circle"></i> Mostrando 1000 de ${datosFiltrados.length} registros
                </td></tr>`;
            }

            html += '</tbody></table>';
            container.innerHTML = html;
        }
    </script>
</body>
</html>
